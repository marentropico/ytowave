appId: com.ytowave.app
productName: YtoWave
copyright: Copyright © 2024 YtoWave

directories:
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: bin/
    to: bin/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.png
  requestedExecutionLevel: asInvoker

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: public/icon.png
  category: public.app-category.music

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: public/icon.png
  category: Audio;AudioVideo

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: YtoWave

publish: null
